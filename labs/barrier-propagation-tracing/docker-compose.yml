# Flink 2.2 + Kafka 3.7 KRaft + barrier-tracing TaskManagers.
# Checkpoint interval = 5s. Логи каждого оператора пишут barrier phases с timestamp.

x-flink-common: &flink-common
  image: flink:2.2.0-java17
  environment: &flink-env
    FLINK_PROPERTIES: |
      jobmanager.rpc.address: jobmanager
      state.backend.type: hashmap
      execution.checkpointing.interval: 5s
      execution.checkpointing.mode: EXACTLY_ONCE
      execution.checkpointing.timeout: 30s
      execution.checkpointing.unaligned: false
      execution.checkpointing.alignment-timeout: 0ms
      taskmanager.numberOfTaskSlots: 4
      taskmanager.memory.process.size: 2048m
      parallelism.default: 4
      # Log all checkpoint events со стороны runtime
      env.java.opts: "-Dlog4j.logger.org.apache.flink.runtime.checkpoint=DEBUG"

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: barrier-tracer-cluster
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      retries: 10

  # Producer льёт ~10k events/s в topic `events`
  producer:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
            --topic events --partitions 4 --replication-factor 1
        i=0
        while true; do
          echo "user_$((i % 100)),event_$i,$(date +%s%3N)" | \
              kafka-console-producer --bootstrap-server kafka:9092 --topic events
          i=$((i + 1))
          # ~10k/s — sleep между batches не нужен, kafka-console-producer сам флашит
        done

  jobmanager:
    <<: *flink-common
    ports:
      - "8081:8081"
    command: jobmanager
    volumes:
      - ./jobs:/jobs:ro

  taskmanager-1:
    <<: *flink-common
    command: taskmanager
    depends_on:
      - jobmanager
    environment:
      <<: *flink-env
      TM_LABEL: tm-1

  taskmanager-2:
    <<: *flink-common
    command: taskmanager
    depends_on:
      - jobmanager
    environment:
      <<: *flink-env
      TM_LABEL: tm-2
