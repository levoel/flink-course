x-flink-common: &flink-common
  image: flink:2.2.0-java17
  environment: &flink-env
    FLINK_PROPERTIES: |
      jobmanager.rpc.address: jobmanager
      state.backend.type: rocksdb
      state.backend.incremental: true
      state.checkpoints.dir: s3://checkpoints/
      execution.checkpointing.interval: 10s
      execution.checkpointing.mode: EXACTLY_ONCE
      s3.endpoint: http://minio:9000
      s3.path-style-access: true
      s3.access-key: minioadmin
      s3.secret-key: minioadmin
      taskmanager.numberOfTaskSlots: 4
      taskmanager.memory.process.size: 2048m
      parallelism.default: 2

services:
  postgres:
    image: postgres:16
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cdc
      POSTGRES_PASSWORD: cdc
      POSTGRES_DB: cdcdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/init:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cdc"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 5
    volumes:
      - minio-data:/data

  mc:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    tty: true
    stdin_open: true

  jobmanager:
    <<: *flink-common
    ports:
      - "8081:8081"
    command: jobmanager
    volumes:
      - ./pipelines:/pipelines:ro
    depends_on:
      minio:
        condition: service_healthy

  taskmanager-1:
    <<: *flink-common
    command: taskmanager
    depends_on:
      - jobmanager

  taskmanager-2:
    <<: *flink-common
    command: taskmanager
    depends_on:
      - jobmanager

  # Flink CDC CLI submitter (3.6.0). Tarball распакован и mount-ится.
  flink-cdc-submitter:
    image: flink:2.2.0-java17
    depends_on:
      - jobmanager
    volumes:
      - ./pipelines:/pipelines:ro
      - flink-cdc:/opt/flink-cdc-3.6.0
    entrypoint:
      - /bin/bash
      - -c
      - |
        if [ ! -f /opt/flink-cdc-3.6.0/bin/flink-cdc.sh ]; then
          echo "Downloading Flink CDC 3.6.0..."
          curl -sSL https://dlcdn.apache.org/flink/flink-cdc-3.6.0/flink-cdc-3.6.0-bin.tar.gz \
            | tar xz -C /opt/
          # Download connectors
          cd /opt/flink-cdc-3.6.0/lib
          curl -sSLO https://repo1.maven.org/maven2/org/apache/flink/flink-cdc-pipeline-connector-postgres/3.6.0/flink-cdc-pipeline-connector-postgres-3.6.0.jar
          curl -sSLO https://repo1.maven.org/maven2/org/apache/flink/flink-cdc-pipeline-connector-paimon/3.6.0/flink-cdc-pipeline-connector-paimon-3.6.0.jar
        fi
        tail -f /dev/null

volumes:
  postgres-data:
  minio-data:
  flink-cdc:
