x-flink-common: &flink-common
  image: flink:2.2.0-java17
  environment: &flink-env
    FLINK_PROPERTIES: |
      jobmanager.rpc.address: jobmanager
      state.backend.type: hashmap
      state.checkpoints.dir: file:///checkpoints/
      execution.checkpointing.interval: 10s
      execution.checkpointing.mode: EXACTLY_ONCE
      execution.checkpointing.timeout: 30s
      taskmanager.numberOfTaskSlots: 2
      taskmanager.memory.process.size: 2048m
      parallelism.default: 2
  volumes:
    - checkpoints:/checkpoints

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_MAX_TIMEOUT_MS: 900000
      CLUSTER_ID: 2pc-test-cluster
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
            --topic producer-output --partitions 2 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
            --topic producer-input --partitions 2 --replication-factor 1
        echo "Topics ready"

  jobmanager:
    <<: *flink-common
    ports:
      - "8081:8081"
    command: jobmanager
    volumes:
      - ./jobs:/jobs:ro
      - checkpoints:/checkpoints

  taskmanager-1:
    <<: *flink-common
    command: taskmanager
    depends_on:
      - jobmanager
      - kafka

  taskmanager-2:
    <<: *flink-common
    command: taskmanager
    depends_on:
      - jobmanager
      - kafka

  verifier:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: tail -f /dev/null

volumes:
  checkpoints:
